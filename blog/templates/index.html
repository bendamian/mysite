{% extends "base.html" %}
{% load static %}

{% block title %}Home | Block - HTMX + Django App{% endblock %}

{% block content %}



<div class="text-center">
    <h1 class="text-4xl font-bold mb-4 text-gray-800">Welcome to Block 🚀</h1>
    <p class="text-lg text-gray-600 mb-6">A modern HTMX + Django learning application</p>
     
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold">Your Contacts</h2>
       
        
  
      <input 
        type="text"
        name="search"
        placeholder="🔍 Search contacts..."
       
        class="input input-bordered w-full max-w-xs"
        hx-get="{% url 'blog:search' %}"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#contact-table"
        hx-include="[name='search']"
        hx-indicator="#spinner"
        hx-on::before-request="document.getElementById('contact-table').style.opacity = 0.4;"
        hx-on::after-request="document.getElementById('contact-table').style.opacity = 1.0;" />
        
       
        

       
           
    
   
    

          
    </div>
   

    <div id="contact-table">
        
        {% include "partials/contact-list.html" %}
    </div>
</div>
{% endblock %}
